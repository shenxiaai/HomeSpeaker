<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeSpeaker Sender</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    margin:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

textarea{
    width:100%;
    height:150px;
    font-size:20px;
    padding:10px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    width:100%;
    height:50px;
    font-size:22px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    color:green;
}

.item{
    padding:10px;
    margin-top:10px;
    border:1px solid #ddd;
    cursor:pointer;
}

#quickButtons{
    margin-top:20px;
}

.quick{
    width:auto;
    padding:10px 18px;
    margin:5px;
    font-size:18px;
}
</style>

</head>

<body>

  <div class="container">

    <h2>家庭广播</h2>

    <textarea id="text"></textarea>

    <button onclick="send()">发送</button>

    <div id="status"></div>

    <h3>常用语</h3>

    <div id="quickButtons">
      <button class="quick" onclick="quickSend('糖糖糖，头抬高一点')">糖糖糖，头抬高一点</button>
      <button class="quick" onclick="quickSend('糖糖糖，背挺直哦')">糖糖糖，背挺直哦</button>
      <button class="quick" onclick="quickSend('开始学习')">📚 开始学习</button>
      <button class="quick" onclick="quickSend('休息5分钟')">☕ 休息5分钟</button>
    </div>

  </div>

<script>

const SUPABASE_URL="https://tkpwdoenhvzkxrwwomvn.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcHdkb2VuaHZ6a3hyd3dvbXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjY1ODksImV4cCI6MjA5ODQwMjU4OX0.gh7Ponb6vb4M3r9RMFlaevyGnzjfVZOmpVhxrsyWrPw";

const client=supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function send(){
    const text=document.getElementById("text").value.trim();
    if(text===""){
        alert("请输入内容");
        return;
    }

    document.getElementById("status").innerHTML="发送中...";

    const { data, error } = await client
    .from("messages")
    .insert([
      {
        content: text
      }
    ]);

    if(error){
        document.getElementById("status").innerHTML=
        "发送失败："+error.message;
        return;
    }

    document.getElementById("status").innerHTML="发送成功";

    document.getElementById("text").value="";

}

async function quickSend(text){
    document.getElementById("text").value = text;
    await send();
}

document.getElementById("text").addEventListener("keydown",e=>{
    if(e.ctrlKey&&e.key==="Enter"){
        send();
    }
});

</script>

</body>
</html>
