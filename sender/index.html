<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sender</title>
</head>
<body>

<h2>广播控制台</h2>

<input id="text" placeholder="输入广播内容" style="width:300px;height:30px;">
<button onclick="send()">发送</button>

<script>
const ws = new WebSocket("wss://https://homespeaker.yuanbao-i-jj.workers.dev/ws");

ws.onopen = () => console.log("connected");

function send() {
  const text = document.getElementById("text").value;

  ws.send(JSON.stringify({
    type: "broadcast",
    id: Date.now().toString(),
    text
  }));

  document.getElementById("text").value = "";
}
</script>

</body>
</html>
