<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Player</title>
</head>

<body style="text-align:center;font-size:30px;padding-top:100px;">

<div id="text">等待广播...</div>

<script>
const ws = new WebSocket("wss://https://homespeaker.yuanbao-i-jj.workers.dev//ws");

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);

  if (msg.type === "broadcast") {
    document.getElementById("text").innerText = msg.text;

    // TTS播报
    const u = new SpeechSynthesisUtterance(msg.text);
    u.lang = "zh-CN";
    speechSynthesis.speak(u);

    // 回执
    ws.send(JSON.stringify({
      type: "played",
      id: msg.id
    }));
  }
};
</script>

</body>
</html>
