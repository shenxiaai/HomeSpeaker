<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HomeSpeaker Player</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{

    margin:0;

    background:#222;

    color:white;

    font-family:Arial;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

#box{

    text-align:center;

    width:90%;

}

#status{

    color:#00ff88;

    font-size:20px;

    margin-bottom:30px;

}

#msg{

    font-size:42px;

    line-height:1.6;

    word-break:break-all;

}

</style>

</head>

<body>

<div id="box">

<div id="status">

正在连接...

</div>

<div id="msg">

等待广播...

</div>

</div>

<script>

const SUPABASE_URL="https://tkpwdoenhvzkxrwwomvn.supabase.co";

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcHdkb2VuaHZ6a3hyd3dvbXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjY1ODksImV4cCI6MjA5ODQwMjU4OX0.gh7Ponb6vb4M3r9RMFlaevyGnzjfVZOmpVhxrsyWrPw";

const client=supabase.createClient(

    SUPABASE_URL,

    SUPABASE_KEY

);

const queue=[];

let speaking=false;

let lastId=0;

document.body.addEventListener("click",()=>{

    speechSynthesis.cancel();

},{once:true});

function speakNext(){

    if(speaking)return;

    if(queue.length===0)return;

    speaking=true;

    const data=queue.shift();

    document.getElementById("msg").innerText=data.content;

    const utter=new SpeechSynthesisUtterance(data.content);

    utter.lang="zh-CN";

    speechSynthesis.cancel();

    speechSynthesis.speak(utter);

    utter.rate=1;

    utter.pitch=1;

    utter.volume=1;

    utter.onend=()=>{

        speaking=false;

        speakNext();

    };

    utter.onerror=()=>{

        speaking=false;

        speakNext();

    };

    speechSynthesis.speak(utter);

}

document.getElementById("status").innerText="已连接";

client

.channel("messages-channel")

.on(

"postgres_changes",

{

event:"INSERT",

schema:"public",

table:"messages"

},

(payload)=>{

    const row=payload.new;

    if(row.id<=lastId){

        return;

    }

    lastId=row.id;

    queue.push(row);

    speakNext();

}

)

.subscribe((status)=>{

    document.getElementById("status").innerText=

    "状态："+status;

});

setInterval(()=>{

    if(document.hidden){

        return;

    }

    if(!speaking){

        speakNext();

    }

},1000);

</script>

</body>

</html>
